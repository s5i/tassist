<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Tibiantis Assistant</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="container">
        <h1>Account Switcher</h1>
        <div id="list"></div>
        <div id="toast" class="toast"></div>
    </div>
    <div class="container">
        <h1>Experience Tracker</h1>

        <div class="exp-cell">
            <span class="exp-label">Total</span>
            <span id="exp-latest" class="exp-value">-</span>
        </div>

        <div class="exp-grid">
            <div class="exp-cell">
                <span class="exp-label">Exp/h - last 1h</span>
                <span id="exp-1h" class="exp-value">-</span>
            </div>
            <div class="exp-cell">
                <span class="exp-label">Exp/h - last 30 min</span>
                <span id="exp-30m" class="exp-value">-</span>
            </div>
            <div class="exp-cell">
                <span class="exp-label">Exp/h - last 10 min</span>
                <span id="exp-10m" class="exp-value">-</span>
            </div>
            <div class="exp-cell">
                <span class="exp-label">Exp/h - last 1 min</span>
                <span id="exp-1m" class="exp-value">-</span>
            </div>
        </div>

        <button id="exp-reset" class="btn btn-exp">Reset</button>

    </div>
    <script src="/main.js"></script>
</body>

</html>
